<!-- Footer -->
<footer>
  <div class="container">
    <div class="footer-grid">
      <div class="footer-column">
        <div class="footer-brand">
          <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" alt="Apple Store">
          <p>Low-cost Apple-compatible accessories for everyday use.</p>
          <div class="social-links">
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
          </div>
        </div>
      </div>
      <div class="footer-column">
        <h4>Categories</h4>
        <ul class="footer-links">
          <li *ngFor="let item of categoryLinks">
            <a routerLink="/products" [queryParams]="{category: item.categorySlug}">{{ item.name }}</a>
          </li>
        </ul>
      </div>
      <div class="footer-column">
        <h4>Support</h4>
        <ul class="footer-links">
          <li><a href="#">Contact Us</a></li>
          <li><a href="#">Support</a></li>
          <li><a href="#">Warranty</a></li>
          <li><a href="#">Returns</a></li>
          <li><a href="#">Shipping</a></li>
          <li><a href="#">FAQ</a></li>
        </ul>
      </div>
      <div class="footer-column">
        <h4>Company</h4>
        <ul class="footer-links">
          <li><a href="#">About</a></li>
          <li><a href="#">Careers</a></li>
          <li><a href="#">Press</a></li>
          <li><a href="#">Privacy</a></li>
          <li><a href="#">Terms</a></li>
          <li><a href="#">Legal</a></li>
        </ul>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2026 Apple Store Live. All rights reserved.</p>
    </div>
  </div>
</footer>
