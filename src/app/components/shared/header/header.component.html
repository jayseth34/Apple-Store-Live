<div class="marquee-container">
  <div class="marquee">
    <span class="marquee-item">POWER BANK</span>
    <span class="marquee-item">COVERS</span>
    <span class="marquee-item">KEYBOARD</span>
    <span class="marquee-item">MOUSE</span>
    <span class="marquee-item">PENCIL</span>
    <span class="marquee-item">AIRPODS</span>
    <span class="marquee-item">WHOOP</span>
    <span class="marquee-item">CONTROLLER</span>
  </div>
</div>

<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container">
    <a class="navbar-brand" (click)="goHome()" style="cursor: pointer">
      <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" alt="Apple Store" />
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav mx-auto">
        <li class="nav-item">
          <a class="nav-link" (click)="goProducts()">All Products</a>
        </li>
        <li class="nav-item" *ngFor="let c of categories">
          <a class="nav-link" (click)="goProducts(c.id)">{{ c.name }}</a>
        </li>
      </ul>

      <div class="d-flex align-items-center" style="gap: 10px">
        <button class="btn btn-link p-2" (click)="goMyOrders()">My Orders</button>
        <button class="btn btn-link p-2" (click)="goCart()" aria-label="Cart">
          Cart
          <span class="badge" *ngIf="getCartCount() > 0">{{ getCartCount() }}</span>
        </button>
        <button class="btn btn-link p-2" (click)="goAdmin()">Admin</button>
      </div>
    </div>
  </div>
</nav>
