<!-- Breadcrumb -->
<section class="breadcrumb-section">
  <div class="container">
    <div class="d-flex justify-content-between align-items-center">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a routerLink="/">Home</a></li>
          <li class="breadcrumb-item"><a routerLink="/products">iPhone</a></li>
          <li class="breadcrumb-item active">{{product?.name}}</li>
        </ol>
      </nav>
      <div class="prev-next">
        <a href="#"><i class="fas fa-chevron-left"></i> PREVIOUS</a>
        <a href="#">NEXT <i class="fas fa-chevron-right"></i></a>
      </div>
    </div>
  </div>
</section>

<!-- Product Detail -->
<section class="product-detail-section" *ngIf="product">
  <div class="container">
    <div class="row">
      <!-- Product Gallery -->
      <div class="col-lg-6 mb-5">
        <div class="d-flex">
          <div class="product-thumbnails">
            <div class="thumbnail" 
                 *ngFor="let image of product.images; let i = index"
                 [class.active]="selectedImageIndex === i"
                 (click)="selectImage(i)">
              <img [src]="image" [alt]="product.name">
            </div>
          </div>
          <div class="flex-grow-1">
            <div class="main-product-image">
              <div class="sale-badge" *ngIf="product.discount">-{{product.discount}}%</div>
              <img [src]="product.images[selectedImageIndex]" [alt]="product.name">
            </div>
          </div>
        </div>
      </div>

      <!-- Product Info -->
      <div class="col-lg-6">
        <div class="product-info">
          <h1>{{product.name}}</h1>
          <div class="product-price">
            <span class="current-price">₹{{product.currentPrice | number}}.00</span>
            <span class="original-price" *ngIf="product.originalPrice">₹{{product.originalPrice | number}}.00</span>
          </div>

          <!-- Color Selection -->
          <div class="color-selection">
            <span class="color-label">COLOR: <span>{{selectedColor.toUpperCase()}}</span></span>
            <div class="color-options">
              <div class="color-option"
                   *ngFor="let color of product.colors"
                   [class]="color.name"
                   [class.active]="selectedColor === color.name"
                   (click)="selectColor(color.name)">
              </div>
            </div>
          </div>

          <!-- Storage Selection -->
          <div class="storage-selection">
            <span class="storage-label">STORAGE: <span>{{selectedStorage}}</span></span>
            <div class="storage-options">
              <div class="storage-option"
                   *ngFor="let storage of product.storageOptions"
                   [class.active]="selectedStorage === storage.size"
                   (click)="selectStorage(storage)">
                {{storage.size}}
              </div>
            </div>
          </div>

          <!-- Price Display -->
          <div class="price-display">
            <div class="final-price">₹{{finalPrice | number}}.00</div>
          </div>

          <!-- Quantity and Add to Cart -->
          <div class="quantity-selector">
            <div class="quantity-controls">
              <button class="quantity-btn" (click)="decreaseQuantity()">-</button>
              <input type="number" class="quantity-input" [(ngModel)]="quantity" min="1">
              <button class="quantity-btn" (click)="increaseQuantity()">+</button>
            </div>
          </div>

          <button class="add-to-cart-btn" (click)="addToCart()">ADD TO CART</button>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- WhatsApp Button -->
<a href="https://wa.me/1234567890" class="whatsapp-btn">
  <i class="fab fa-whatsapp"></i>Contact Us
</a>
