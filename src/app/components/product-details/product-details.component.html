<section class="page-header">
  <div class="container">
    <a routerLink="/products">← Back to products</a>
  </div>
</section>

<section class="products-section">
  <div class="container">
    <p *ngIf="loading">Loading...</p>
    <p *ngIf="error" style="color: #b00020">{{ error }}</p>

    <div *ngIf="product" class="product-details">
      <div class="left">
        <img [src]="displayImageUrl()" [alt]="product.name" loading="lazy" />
      </div>

      <div class="right">
        <div class="product-category">{{ product.category }}</div>
        <h2>{{ product.name }}</h2>
        <p>{{ product.description }}</p>

        <div class="product-price">
          <span class="current-price">&#8377;{{ inr(product.pricePaise) | number: '1.0-2' }}</span>
          <span class="original-price" *ngIf="product.compareAtPricePaise">
            &#8377;{{ inr(product.compareAtPricePaise!) | number: '1.0-2' }}
          </span>
        </div>

        <div class="qty">
          <button type="button" (click)="decreaseQuantity()">-</button>
          <span>{{ quantity }}</span>
          <button type="button" (click)="increaseQuantity()">+</button>
        </div>

        <div class="checkout-card">
          <div class="checkout-head">
            <h3>Delivery details</h3>
            <span class="hint">Saved on this device</span>
          </div>

          <div class="form-grid">
            <div>
              <label>Name</label>
              <input [(ngModel)]="customer.name" (ngModelChange)="saveCustomer()" placeholder="Full name" />
            </div>
            <div>
              <label>Phone</label>
              <input [(ngModel)]="customer.phone" (ngModelChange)="saveCustomer()" placeholder="Phone number" />
            </div>
            <div class="full">
              <label>Email (optional)</label>
              <input [(ngModel)]="customer.email" (ngModelChange)="saveCustomer()" placeholder="Email" />
            </div>
            <div class="full">
              <label>Address line 1</label>
              <input [(ngModel)]="customer.address1" (ngModelChange)="saveCustomer()" placeholder="House / Street" />
            </div>
            <div class="full">
              <label>Address line 2 (optional)</label>
              <input [(ngModel)]="customer.address2" (ngModelChange)="saveCustomer()" placeholder="Area / Landmark" />
            </div>
            <div>
              <label>City</label>
              <input [(ngModel)]="customer.city" (ngModelChange)="saveCustomer()" placeholder="City" />
            </div>
            <div>
              <label>State</label>
              <input [(ngModel)]="customer.state" (ngModelChange)="saveCustomer()" placeholder="State" />
            </div>
            <div>
              <label>Pincode</label>
              <input [(ngModel)]="customer.pincode" (ngModelChange)="saveCustomer()" placeholder="Pincode" />
            </div>
            <div>
              <label>Country</label>
              <input [(ngModel)]="customer.country" (ngModelChange)="saveCustomer()" placeholder="IN" />
            </div>
          </div>
        </div>

        <div class="cta-row">
          <button class="btn-secondary" type="button" (click)="addToCart()" [disabled]="!product || product.stock <= 0">
            {{ addedToCart ? 'Added!' : 'Add to cart' }}
          </button>
          <button class="btn-primary" type="button" (click)="buyNow()" [disabled]="paying || product.stock <= 0">
            {{ product.stock <= 0 ? 'Out of stock' : (paying ? 'Opening payment...' : 'Buy now') }}
          </button>
        </div>

        <button class="btn-link" type="button" (click)="goCart()" *ngIf="addedToCart">Go to cart</button>

        <p *ngIf="paymentStatus" style="margin-top: 10px">{{ paymentStatus }}</p>
      </div>
    </div>
  </div>
</section>
